# WordMaster — Issue 触发自动检测 + Agent 检查
#
# 设计思路(教学注释):
#   1. 触发器(下面 on 块):谁开了/编辑/重开了 issue,就跑这个流程
#   2. Stage 1 (静态检测 + 测试):纯 GitHub Actions 跑,不消耗 API key
#   3. Stage 2 (Agent 检查):用 DeepSeek 让 AI 判断 issue 是否合理,自动评论回 issue
#   4. 失败兜底:任一阶段失败都会自动评论说明原因
#
# 安全要点:
#   - API key 永远用 ${{ secrets.DEEPSEEK_API_KEY }} 引用,workflow 文件本身不含明文
#   - 不会 echo/打印/写入任何 secret 到日志或评论

name: Issue Handler

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write        # 允许机器人写评论
  contents: read       # 允许 checkout 代码

jobs:
  check-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ========== Stage 1: 静态检测 + 测试 ==========
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run ktlint check
        # 项目没接 ktlint gradle plugin,直接用 CLI(跟本地开发一致)
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint
          chmod +x ktlint
          ./ktlint "app/src/main/java/com/wordmaster/app/**/*.kt" "app/src/test/java/com/wordmaster/app/**/*.kt"

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon
        continue-on-error: false

      - name: Run debug build
        # 顺手验证编译能不能过
        run: ./gradlew :app:assembleDebug --no-daemon
        continue-on-error: false

      # ========== Stage 2: DeepSeek Agent 检查 ==========
      - name: Collect issue context
        id: ctx
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          {
            echo "title<<EOF"
            echo "$ISSUE_TITLE"
            echo "EOF"
            echo "body<<EOF"
            echo "$ISSUE_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Call DeepSeek for issue verdict
        id: verdict
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ISSUE_TITLE: ${{ steps.ctx.outputs.title }}
          ISSUE_BODY: ${{ steps.ctx.outputs.body }}
        run: |
          set -euo pipefail
          # 把 issue 转成一段给 LLM 的提示词
          PROMPT=$(cat <<JSON
          {
            "model": "deepseek-chat",
            "temperature": 0.2,
            "messages": [
              {
                "role": "system",
                "content": "你是 WordMaster 项目维护者助手。WordMaster 是一个 Kotlin + Jetpack Compose + Room 的 Android 背单词 App,使用艾宾浩斯遗忘曲线。请评估用户提交的 issue,并给出简洁、结构化的 verdict。必须以 JSON 输出,字段:verdict (PASS|CONCERNS|FAIL), summary (一句话总结), details (最多 5 条要点,markdown 列表)。"
              },
              {
                "role": "user",
                "content": "Issue 标题: ${ISSUE_TITLE}\n\nIssue 正文:\n${ISSUE_BODY}"
              }
            ]
          }
          JSON
          )

          # 调用 DeepSeek Chat Completions API
          RESPONSE=$(curl -sS \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PROMPT" \
            https://api.deepseek.com/v1/chat/completions)

          # 把 verdict 全文存到 outputs,供后面评论用
          VERDICT_TEXT=$(echo "$RESPONSE" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'])")

          {
            echo "text<<EOF"
            echo "$VERDICT_TEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ========== Stage 3: 自动评论到 issue ==========
      - name: Comment verdict on issue
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: agent-verdict
          message: |
            🤖 **WordMaster Issue Agent 审查结果**

            ✅ Stage 1 静态检测:通过 (ktlint / unit test / assembleDebug)
            ✅ Stage 2 Agent 审查:已生成 verdict

            ---

            ${{ steps.verdict.outputs.text }}

            ---

            @xhmTmax530 请人工 review 后决定是否合并。